<header
  *ngIf="!isLoggedIn"
  class="h-20 bg-primary text-white flex justify-between items-center px-4"
>
  <img src="/assets/logoooclassic.png" alt="Logo" class="h-12" />
  <div class="flex items-center gap-2">
    <a
      routerLink="/signup"
      class="px-4 py-2 rounded-md border border-white/30 text-white hover:bg-white/10 transition"
      >Sign up</a
    >
    <a
      routerLink="/login"
      class="bg-buttons text-white px-4 py-2 rounded-md w-[178px] h-[54px] inline-flex items-center justify-center"
      >Log-in</a
    >
  </div>
</header>

<main class="min-h-screen">
  <router-outlet></router-outlet>
</main>

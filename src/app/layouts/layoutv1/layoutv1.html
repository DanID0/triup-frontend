<header
  *ngIf="!isLoggedIn"
  class="flex flex-wrap items-center justify-between gap-2 border-b border-[var(--ui-border)] bg-[var(--ui-header)] px-3 py-2 text-[var(--ui-text)] transition-colors sm:px-4"
>
  <a routerLink="/" class="flex items-center gap-2">
    <img src="/assets/logoooclassic.png" alt="Logo" class="h-8 w-8 object-contain sm:h-10 sm:w-10" />
    <span class="text-xl font-semibold text-[var(--ui-text)] sm:text-2xl">TaskM</span>
  </a>

  <div class="flex w-full flex-wrap items-center justify-end gap-2 sm:w-auto sm:flex-nowrap">
    <button
      type="button"
      (click)="toggleLanguage()"
      class="rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] px-2.5 py-1.5 text-[10px] font-semibold text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)] sm:px-3 sm:py-2 sm:text-xs"
    >
      {{ 'language' | i18n }}: {{ i18n.lang() === 'lv' ? 'LV' : 'EN' }}
    </button>
    <button
      type="button"
      (click)="toggleTheme()"
      class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] text-base text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)] sm:h-9 sm:w-9"
      [attr.aria-label]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
      [title]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
    >
      {{ theme.isDark() ? '☀️' : '🌙' }}
    </button>
    <a
      routerLink="/signup"
      class="rounded-md border border-[var(--ui-border)] px-3 py-1.5 text-sm text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)] sm:px-4 sm:py-2"
      >{{ 'signUp' | i18n }}</a
    >
    <a
      routerLink="/login"
      class="inline-flex h-9 items-center justify-center rounded-md bg-buttons px-4 py-1.5 text-sm text-white transition hover:opacity-90 sm:h-11 sm:px-5 sm:py-2"
      >{{ 'logIn' | i18n }}</a
    >
  </div>
</header>

<main class="min-h-screen">
  <router-outlet></router-outlet>
</main>

<header
  *ngIf="!isLoggedIn"
  class="h-20 flex justify-between items-center border-b px-4 transition-colors border-[var(--ui-border)] bg-[var(--ui-header)] text-[var(--ui-text)]"
>
  <a routerLink="/" class="flex items-center gap-2">
    <img src="/assets/logoooclassic.png" alt="Logo" class="h-12 w-12 object-contain" />
    <span class="text-3xl font-semibold text-[var(--ui-text)]">TaskM</span>
  </a>
  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="toggleLanguage()"
      class="rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] px-3 py-2 text-xs font-semibold text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)]"
    >
      {{ 'language' | i18n }}: {{ i18n.lang() === 'lv' ? 'LV' : 'EN' }}
    </button>
    <button
      type="button"
      (click)="toggleTheme()"
      class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] text-base text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)]"
      [attr.aria-label]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
      [title]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
    >
      {{ theme.isDark() ? '☀️' : '🌙' }}
    </button>
    <a
      routerLink="/signup"
      class="rounded-md border border-[var(--ui-border)] px-4 py-2 text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)]"
      >{{ 'signUp' | i18n }}</a
    >
    <a
      routerLink="/login"
      class="inline-flex h-[54px] w-[178px] items-center justify-center rounded-md bg-buttons px-4 py-2 text-white transition hover:opacity-90"
      >{{ 'logIn' | i18n }}</a
    >
  </div>
</header>

<main class="min-h-screen">
  <router-outlet></router-outlet>
</main>

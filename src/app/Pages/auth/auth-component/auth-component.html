<section class="flex min-h-screen bg-white">
  <aside class="relative hidden w-[42%] overflow-hidden lg:block">
    <img src="/assets/authimg.png" class="h-full w-full object-cover" alt="" />
    <a routerLink="/" class="absolute left-8 top-8 flex items-center gap-2 text-white">
      <img src="/assets/logoooclassic.png" alt="TaskM" class="h-6 w-6 object-contain" />
      <span class="text-2xl font-semibold tracking-wide">TaskM</span>
    </a>
    <div class="absolute inset-x-0 bottom-0 bg-white/95 px-10 py-8 text-slate-800">
      <p class="text-5xl italic leading-none">“</p>
      <p class="mb-4 text-5xl italic leading-tight">Pick up where<br />left off.</p>
      <p class="text-4xl leading-tight">Stay focused and keep your tasks<br />moving with TaskM.</p>
    </div>
  </aside>

  <div class="flex flex-1 items-center justify-center px-4 py-8 sm:px-6 sm:py-10 lg:px-10">
    <div class="w-full max-w-[420px]">
      <h1 class="text-center text-4xl font-bold text-slate-900 sm:text-5xl">{{ title() }}</h1>
      <p class="mt-2 text-center text-2xl font-semibold text-slate-500 sm:text-3xl">
        {{ isSignup() ? ('authSignupSubtitle' | i18n) : ('authLoginSubtitle' | i18n) }}
      </p>

      <form (ngSubmit)="submit()" #authForm="ngForm" class="mt-6 flex w-full flex-col gap-4" novalidate>
        <div
          *ngIf="errorMessage() as err"
          class="rounded-md border border-red-500/30 bg-red-500/10 px-3 py-2 text-sm text-[var(--ui-danger)]"
          role="alert"
        >
          {{ err }}
        </div>

        <label class="flex flex-col gap-1">
          <input
            name="email"
            type="email"
            autocomplete="email"
            required
            [(ngModel)]="email"
            [disabled]="submitting()"
            [placeholder]="'email' | i18n"
            class="h-12 rounded-md border border-indigo-300 bg-white px-3 text-base text-slate-900 focus:border-indigo-500 focus:outline-none disabled:opacity-60"
          />
        </label>

        <label *ngIf="isSignup()" class="flex flex-col gap-1">
          <input
            name="username"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            required
            minlength="3"
            [(ngModel)]="username"
            [disabled]="submitting()"
            [placeholder]="'username' | i18n"
            class="h-12 rounded-md border border-indigo-300 bg-white px-3 text-base text-slate-900 focus:border-indigo-500 focus:outline-none disabled:opacity-60"
          />
        </label>

        <label class="flex flex-col gap-1">
          <input
            name="password"
            type="password"
            [attr.autocomplete]="isSignup() ? 'new-password' : 'current-password'"
            required
            minlength="7"
            [(ngModel)]="password"
            [disabled]="submitting()"
            [placeholder]="'password' | i18n"
            class="h-12 rounded-md border border-indigo-300 bg-white px-3 text-base text-slate-900 focus:border-indigo-500 focus:outline-none disabled:opacity-60"
          />
        </label>

        <label *ngIf="isSignup()" class="flex flex-col gap-1">
          <input
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            required
            minlength="7"
            [(ngModel)]="confirmPassword"
            [disabled]="submitting()"
            placeholder="Confirm password"
            class="h-12 rounded-md border border-indigo-300 bg-white px-3 text-base text-slate-900 focus:border-indigo-500 focus:outline-none disabled:opacity-60"
          />
        </label>

        <a *ngIf="!isSignup()" href="#" class="text-sm font-semibold text-indigo-600 hover:underline">
          {{ 'forgotPassword' | i18n }}
        </a>

        <button
          type="submit"
          [disabled]="submitting() || !authForm.form.valid"
          class="inline-flex h-12 items-center justify-center rounded-md bg-indigo-600 px-4 text-lg font-semibold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60 sm:text-xl"
        >
          <span *ngIf="!submitting()">{{ isSignup() ? ('createAccount' | i18n) : ('logIn' | i18n) }}</span>
          <span *ngIf="submitting()" class="flex items-center gap-2">
            <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/70 border-t-transparent"></span>
            {{ 'pleaseWait' | i18n }}
          </span>
        </button>

        <p class="mt-2 text-center text-base text-slate-400 sm:text-lg">
          <ng-container *ngIf="!isSignup()">
            {{ 'noAccount' | i18n }}
            <button type="button" (click)="switchMode('signup')" class="ml-1 font-semibold text-indigo-600 hover:underline">
              {{ 'signUp' | i18n }}
            </button>
          </ng-container>
          <ng-container *ngIf="isSignup()">
            {{ 'alreadyAccount' | i18n }}
            <button type="button" (click)="switchMode('login')" class="ml-1 font-semibold text-indigo-600 hover:underline">
              {{ 'logIn' | i18n }}
            </button>
          </ng-container>
        </p>
      </form>
    </div>
  </div>
</section>

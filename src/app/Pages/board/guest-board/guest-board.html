<div class="relative flex min-h-screen flex-col" [ngStyle]="backgroundStyle()">
  <div class="pointer-events-none absolute inset-0 bg-slate-950/40"></div>

  <header
    class="relative z-20 flex items-center justify-between gap-4 border-b border-[var(--ui-border)] bg-[var(--ui-header)]/95 px-4 py-2 text-[var(--ui-text)] backdrop-blur transition-colors"
  >
    <a [routerLink]="user() ? '/workboard' : '/'" class="flex items-center gap-2 text-sm font-semibold text-[var(--ui-text)]">
      <img src="/assets/logoooclassic.png" alt="TaskM" class="h-6 w-6 object-contain" />
      <span>TaskM</span>
    </a>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="toggleLanguage()"
        class="rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] px-3 py-1.5 text-xs font-semibold text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)]"
      >
        {{ 'language' | i18n }}: {{ i18n.lang() === 'lv' ? 'LV' : 'EN' }}
      </button>
      <button
        type="button"
        (click)="toggleTheme()"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] text-base text-[var(--ui-text)] transition hover:bg-[var(--ui-surface-2)]"
        [attr.aria-label]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
        [title]="theme.isDark() ? ('lightMode' | i18n) : ('darkMode' | i18n)"
      >
        {{ theme.isDark() ? '☀️' : '🌙' }}
      </button>
      <a
        *ngIf="!user()"
        routerLink="/login"
        [queryParams]="{ redirect: loginRedirect }"
        class="rounded-md bg-indigo-600 px-4 py-1.5 text-xs font-semibold text-white hover:bg-indigo-500"
      >
        {{ 'logIn' | i18n }}
      </a>
      <a
        *ngIf="user()"
        routerLink="/workboard"
        class="rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)] px-4 py-1.5 text-xs font-semibold text-[var(--ui-text)] hover:bg-[var(--ui-surface-2)]"
      >
        {{ user()?.username }}
      </a>
    </div>
  </header>

  <div
    *ngIf="board() as b"
    class="relative z-20 flex items-center gap-3 border-b border-[var(--ui-border)] bg-[var(--ui-header)]/90 px-4 py-2 text-[var(--ui-text)]"
  >
    <h1 class="text-base font-semibold">{{ b.name }}</h1>
    <span
      class="ml-2 rounded-full border border-[var(--ui-border)] bg-[var(--ui-surface-2)] px-2 py-0.5 text-[10px] uppercase tracking-wide text-[var(--ui-text-muted)]"
    >
      {{ 'readOnlyShared' | i18n }}
    </span>
  </div>

  <main class="relative z-10 flex-1 overflow-x-auto text-[var(--ui-text)]">
    <div *ngIf="error() as e" class="m-6 rounded-md border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-700 dark:text-red-300">
      {{ e }}
    </div>

    <div class="flex min-w-max items-start gap-3 px-4 py-4">
      <div
        *ngFor="let col of board()?.columns || []; trackBy: trackColumn"
        class="w-72 shrink-0 rounded-md border border-[var(--ui-border)] bg-[var(--ui-surface)]/95 shadow-lg backdrop-blur"
      >
        <div class="flex items-center justify-between gap-2 border-b border-[var(--ui-border)] px-3 py-2">
          <span class="flex-1 text-sm font-semibold text-[var(--ui-text)]">{{ col.name }}</span>
        </div>

        <div class="flex max-h-[calc(100vh-240px)] flex-col gap-2 overflow-y-auto px-3 py-3">
          <app-task
            *ngFor="let t of col.tasks || []; trackBy: trackTask"
            [task]="t"
            [readonly]="true"
            (open)="openTask($event)"
          ></app-task>

          <div *ngIf="!col.tasks?.length" class="text-xs italic text-[var(--ui-text-muted)]">
            {{ 'noCards' | i18n }}
          </div>
        </div>
      </div>
    </div>
  </main>

  <app-task-modal
    *ngIf="selectedTask() as t"
    [task]="t"
    [members]="[]"
    [readonlyMode]="true"
    [skipCommentFetch]="true"
    (closed)="closeTask()"
  ></app-task-modal>
</div>

<aside
  class="fixed top-0 right-0 z-40 flex h-full w-80 max-w-[90vw] flex-col border-l border-[var(--ui-border)] bg-[var(--ui-surface)] text-[var(--ui-text)] shadow-2xl"
  (click)="$event.stopPropagation()"
>
  <header class="flex items-center justify-between border-b border-[var(--ui-border)] px-4 py-3">
    <h3 class="text-sm font-semibold">{{ 'filter' | i18n }}</h3>
    <button
      type="button"
      class="text-lg leading-none text-[var(--ui-text-muted)] hover:text-[var(--ui-text)]"
      (click)="closed.emit()"
      aria-label="Close"
    >
      ×
    </button>
  </header>

  <div class="flex-1 space-y-6 overflow-y-auto px-4 py-4 text-sm">
    <section>
      <label class="mb-1 block text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'keyword' | i18n }}</label>
      <input
        type="text"
        [(ngModel)]="value.keyword"
        (ngModelChange)="emit()"
        [placeholder]="'enterKeyword' | i18n"
        class="w-full rounded-md border border-[var(--ui-border)] bg-[var(--ui-input)] px-3 py-2 text-sm text-[var(--ui-text)] outline-none focus:border-indigo-500"
      />
      <p class="mt-1 text-[11px] text-[var(--ui-text-muted)]">
        {{ 'searchCardsMembersLabels' | i18n }}
      </p>
    </section>

    <section>
      <h4 class="mb-2 text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'members' | i18n }}</h4>
      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="member-mode"
            class="accent-indigo-500"
            [checked]="value.members === 'any'"
            (change)="setMembers('any')"
          />
          <span>{{ 'any' | i18n }}</span>
        </label>
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="member-mode"
            class="accent-indigo-500"
            [checked]="value.members === 'none'"
            (change)="setMembers('none')"
          />
          <span class="inline-flex items-center gap-2">
            <span
              class="flex h-5 w-5 items-center justify-center rounded-full bg-[var(--ui-surface-2)] text-[10px] text-[var(--ui-text)]"
            >
              ∅
            </span>
            {{ 'noMembers' | i18n }}
          </span>
        </label>
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="member-mode"
            class="accent-indigo-500"
            [checked]="value.members === 'me'"
            (change)="setMembers('me')"
          />
          <span class="inline-flex items-center gap-2">
            <span
              class="flex h-5 w-5 items-center justify-center rounded-full bg-fuchsia-600 text-white text-[10px]"
            >
              M
            </span>
            {{ 'cardsAssignedToMe' | i18n }}
          </span>
        </label>

        <button
          type="button"
          class="mt-1 w-full rounded-md border border-[var(--ui-border)] bg-[var(--ui-input)] px-3 py-2 text-left text-xs text-[var(--ui-text)] hover:border-indigo-500"
          (click)="showMembers.set(!showMembers())"
        >
          {{ showMembers() ? ('hideMembers' | i18n) : ('selectMembers' | i18n) }}
        </button>

        <div *ngIf="showMembers()" class="space-y-2 pl-1">
          <label
            *ngFor="let m of members"
            class="flex items-center gap-2 text-xs"
          >
            <input
              type="checkbox"
              class="accent-indigo-500"
              [checked]="isMemberSelected(m.user?.id || '')"
              (change)="toggleMember(m.user?.id || '')"
            />
            <span
              class="flex h-5 w-5 items-center justify-center rounded-full bg-fuchsia-600 text-white text-[10px]"
            >
              {{ (m.user?.username || '?').charAt(0).toUpperCase() }}
            </span>
            <span class="truncate">{{ m.user?.username }}</span>
          </label>
          <p *ngIf="!members.length" class="text-[11px] text-[var(--ui-text-muted)]">
            {{ 'noMembersYet' | i18n }}
          </p>
        </div>
      </div>
    </section>

    <section>
      <h4 class="mb-2 text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'cardStatus' | i18n }}</h4>
      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="card-status"
            class="accent-indigo-500"
            [checked]="value.cardStatus === 'complete'"
            (change)="value.cardStatus = 'complete'; emit()"
          />
          <span>{{ 'markedComplete' | i18n }}</span>
        </label>
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="card-status"
            class="accent-indigo-500"
            [checked]="value.cardStatus === 'incomplete'"
            (change)="value.cardStatus = 'incomplete'; emit()"
          />
          <span>{{ 'markedNotComplete' | i18n }}</span>
        </label>
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="card-status"
            class="accent-indigo-500"
            [checked]="value.cardStatus === 'all'"
            (change)="value.cardStatus = 'all'; emit()"
          />
          <span class="text-[var(--ui-text-muted)]">{{ 'any' | i18n }}</span>
        </label>
      </div>
    </section>

    <section>
      <h4 class="mb-2 text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'dueDate' | i18n }}</h4>
      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="due-date"
            class="accent-indigo-500"
            [checked]="value.dueDate === 'any'"
            (change)="value.dueDate = 'any'; emit()"
          />
          <span class="text-[var(--ui-text-muted)]">{{ 'any' | i18n }}</span>
        </label>
        <label
          *ngFor="let opt of dueDateOptions"
          class="flex items-center gap-2"
        >
          <input
            type="radio"
            name="due-date"
            class="accent-indigo-500"
            [checked]="value.dueDate === opt.id"
            (change)="value.dueDate = opt.id; emit()"
          />
          <span class="inline-flex items-center gap-2">
            <span class="h-2.5 w-2.5 rounded-full" [style.background]="opt.color"></span>
            {{ opt.label | i18n }}
          </span>
        </label>
      </div>
    </section>

    <section>
      <h4 class="mb-2 text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'labels' | i18n }}</h4>
      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="label-mode"
            class="accent-indigo-500"
            [checked]="value.labels === 'any'"
            (change)="setLabels('any')"
          />
          <span class="text-[var(--ui-text-muted)]">{{ 'any' | i18n }}</span>
        </label>
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="label-mode"
            class="accent-indigo-500"
            [checked]="value.labels === 'none'"
            (change)="setLabels('none')"
          />
          <span>{{ 'noLabels' | i18n }}</span>
        </label>

        <div class="space-y-1 pt-1">
          <label
            *ngFor="let l of labels"
            class="flex items-center gap-2"
          >
            <input
              type="checkbox"
              class="accent-indigo-500"
              [checked]="isLabelSelected(l.text)"
              (change)="toggleLabel(l.text)"
            />
            <span
              class="flex h-4 flex-1 items-center rounded px-2 text-[11px] font-medium text-white/90"
              [style.background]="l.color"
            >
              {{ l.text }}
            </span>
          </label>
        </div>
      </div>
    </section>

    <section>
      <h4 class="mb-2 text-xs font-semibold text-[var(--ui-text-muted)]">{{ 'activity' | i18n }}</h4>
      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input
            type="radio"
            name="activity"
            class="accent-indigo-500"
            [checked]="value.activity === 'any'"
            (change)="value.activity = 'any'; emit()"
          />
          <span class="text-[var(--ui-text-muted)]">{{ 'any' | i18n }}</span>
        </label>
        <label
          *ngFor="let opt of activityOptions"
          class="flex items-center gap-2"
        >
          <input
            type="radio"
            name="activity"
            class="accent-indigo-500"
            [checked]="value.activity === opt.id"
            (change)="value.activity = opt.id; emit()"
          />
          <span>{{ opt.label | i18n }}</span>
        </label>
      </div>
    </section>
  </div>
</aside>

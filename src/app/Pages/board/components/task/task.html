<div
  class="group relative cursor-pointer overflow-hidden rounded-md border border-[var(--ui-border)] bg-[var(--ui-elevated)] text-[var(--ui-text)] shadow-sm transition hover:border-indigo-500/60"
  [attr.draggable]="!readonly"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd($event)"
  (click)="onClick()"
>
  <img
    *ngIf="coverUrl"
    [src]="coverUrl"
    alt="cover"
    class="h-24 w-full object-cover"
  />

  <div class="p-3 space-y-2">
    <p class="text-sm leading-snug">{{ task.name }}</p>

    <div class="flex items-center gap-2 flex-wrap">
      <span
        *ngIf="labelColor as lc"
        class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10px] font-semibold"
        [style.background]="lc.color + '1A'"
        [style.color]="lc.color"
      >
        <span class="h-1.5 w-1.5 rounded-full" [style.background]="lc.color"></span>
        {{ lc.text | i18n }}
      </span>

      <span
        *ngIf="dueBadge as d"
        class="inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[10px] font-semibold text-white"
        [style.background]="d.color"
        [title]="d.status | i18n"
      >
        {{ d.label }}
      </span>

      <span
        *ngIf="task.completed"
        class="text-[10px] text-emerald-400 inline-flex items-center gap-1"
      >
        {{ 'done' | i18n }}
      </span>
    </div>

    <div
      *ngIf="showAssignee"
      class="flex items-center justify-end text-[11px] text-[var(--ui-text-muted)]"
    >
      <span class="inline-flex items-center gap-1.5">
        <img
          *ngIf="assigneePhotoUrl as au"
          [src]="au"
          alt=""
          class="h-5 w-5 rounded-full object-cover"
          [title]="task.assignee?.username"
        />
        <span
          *ngIf="!assigneePhotoUrl"
          class="flex h-5 w-5 items-center justify-center rounded-full bg-fuchsia-600 text-white text-[9px] font-semibold"
          [title]="task.assignee?.username"
        >
          {{ (task.assignee?.username || '?').charAt(0).toUpperCase() }}
        </span>
        <span class="truncate max-w-28">{{ task.assignee?.username }}</span>
      </span>
    </div>
  </div>
</div>
